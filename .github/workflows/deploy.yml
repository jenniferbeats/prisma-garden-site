name: Deploy Quartz site

on:
  push:
    branches:
      - main  # se ejecuta cada vez que haces push a main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout del repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Instalar Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3️⃣ Instalar dependencias
      - name: Install dependencies
        run: npm install

      # 4️⃣ Limpiar build anterior
      - name: Clean previous build
        run: rm -rf build/*

      # 5️⃣ Generar Quartz
      - name: Build Quartz
        run: npx quartz build

      # 6️⃣ Subir build completo como artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      # 7️⃣ Deploy a GitHub Pages reemplazando todo
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4